version: '3.8'

services:
  hadoop-master:
    image: bde2020/hadoop-namenode:2.0.0-hadoop2.7.4-java8
    container_name: hadoop-namenode
    ports:
      - "9870:50070"  # NameNode Web UI
      - "9000:9000"   # HDFS
    volumes:
      - namenode:/hadoop/dfs/name
      - ./data:/data
      - ./mapreduce:/mapreduce
      - ./output:/output
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-master:9000
      - CORE_CONF_hadoop_proxyuser_hue_hosts=*
      - CORE_CONF_hadoop_proxyuser_hue_groups=*
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_permissions_enabled=false
    command: >
      bash -c "
      apt-get update && apt-get install -y python3 python3-pip
      /entrypoint.sh /run.sh
      "

  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop2.7.4-java8
    container_name: hadoop-datanode
    volumes:
      - datanode:/hadoop/dfs/data
      - ./data:/data
      - ./mapreduce:/mapreduce
      - ./output:/output
    environment:
      SERVICE_PRECONDITION: "hadoop-namenode:50070"
      CORE_CONF_fs_defaultFS: hdfs://hadoop-master:9000
    depends_on:
      - hadoop-master

  hadoop-resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop2.7.4-java8
    container_name: hadoop-resourcemanager
    ports:
      - "8088:8088"
    environment:
      SERVICE_PRECONDITION: "hadoop-namenode:50070 hadoop-datanode:50075"
    depends_on:
      - hadoop-master
      - hadoop-datanode

  hadoop-nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop2.7.4-java8
    container_name: hadoop-nodemanager
    environment:
      SERVICE_PRECONDITION: "hadoop-namenode:50070 hadoop-datanode:50075 hadoop-resourcemanager:8088"
    depends_on:
      - hadoop-master
      - hadoop-datanode
      - hadoop-resourcemanager

volumes:
  namenode:
  datanode: